<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - BAS SaaS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="8" fill="url(#gradient)"/>
                <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                        <stop offset="0%" stop-color="#2563EB"/>
                        <stop offset="100%" stop-color="#10B981"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="brand-name">BAS</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="users.html" class="nav-item">
                <span class="icon">👥</span>
                <span>Usuarios</span>
            </a>
            <a href="subscriptions.html" class="nav-item">
                <span class="icon">💳</span>
                <span>Suscripciones</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <span class="icon">📈</span>
                <span>Analytics</span>
            </a>
            <a href="settings.html" class="nav-item active">
                <span class="icon">⚙️</span>
                <span>Configuración</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div class="user-details">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail">loading@...</div>
                </div>
            </div>
            <button class="btn-logout" id="logoutBtn">🚪 Salir</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="dashboard-header">
            <div>
                <h1>Configuración</h1>
                <p class="subtitle">Gestiona tu perfil y preferencias</p>
            </div>
        </header>

        <div class="settings-container">
            <!-- Profile Settings -->
            <div class="settings-card">
                <h2>Perfil</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" id="profileName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profileEmail" required>
                    </div>
                    <button type="submit" class="btn-primary">Guardar cambios</button>
                </form>
            </div>

            <!-- Password Settings -->
            <div class="settings-card">
                <h2>Cambiar contraseña</h2>
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Contraseña actual</label>
                        <input type="password" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Nueva contraseña</label>
                        <input type="password" id="newPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Confirmar nueva contraseña</label>
                        <input type="password" id="confirmPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn-primary">Actualizar contraseña</button>
                </form>
            </div>

            <!-- Notifications Settings -->
            <div class="settings-card">
                <h2>Notificaciones</h2>
                <div class="settings-options">
                    <label class="setting-option">
                        <input type="checkbox" id="emailNotifications" checked>
                        <div>
                            <strong>Notificaciones por email</strong>
                            <p>Recibe actualizaciones importantes por correo</p>
                        </div>
                    </label>
                    <label class="setting-option">
                        <input type="checkbox" id="marketingEmails">
                        <div>
                            <strong>Emails de marketing</strong>
                            <p>Ofertas, novedades y contenido relevante</p>
                        </div>
                    </label>
                    <label class="setting-option">
                        <input type="checkbox" id="weeklyReports" checked>
                        <div>
                            <strong>Reportes semanales</strong>
                            <p>Resumen de actividad y métricas</p>
                        </div>
                    </label>
                </div>
                <button id="saveNotifications" class="btn-primary">Guardar preferencias</button>
            </div>

            <!-- Danger Zone -->
            <div class="settings-card danger-zone">
                <h2>⚠️ Zona peligrosa</h2>
                <p>Estas acciones son irreversibles. Procede con precaución.</p>
                <div class="danger-actions">
                    <button id="exportDataBtn" class="btn-secondary">📥 Exportar mis datos</button>
                    <button id="deleteAccountBtn" class="btn-danger">🗑️ Eliminar cuenta</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
